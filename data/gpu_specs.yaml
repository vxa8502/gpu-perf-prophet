    in_model_scope: false           # spec is verified but scope gate is blocked: LOGO-CV ρ=0.019 (14 rows, 35 rounds) — wait for v7.0+ MLPerf data
    aliases:
      - "AMD Instinct MI350X"
      - "AMD Instinct MI350X 288GB HBM3e"

